<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Dashboard - Faith & Fashion Nairobi">
  <meta name="theme-color" content="#1e3a5f">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; img-src 'self' data: https:;">
  <title>Admin - Faith & Fashion Nairobi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Load Supabase config from API endpoint -->
  <script src="/api/config.js" defer></script>
  <!-- Load main application bundle -->
  <script type="module" src="/src/main.js" defer></script>
</head>
<body>
  <header class="header" id="header"></header>
   
  <section class="section">
    <div class="container">
      <div id="loginContainer">
        <div class="card" style="max-width:400px;margin:0 auto;">
          <h2 style="text-align:center;">Admin Login</h2>
          <form id="loginForm" style="display:flex;flex-direction:column;gap:1rem;">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="loginEmail" required placeholder="admin@example.com">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="loginPassword" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
            <p id="loginError" style="color:var(--error);text-align:center;display:none;">Invalid credentials</p>
          </form>
        </div>
      </div>
      
      <div id="adminPanel" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
          <h1>Admin Dashboard</h1>
          <button class="btn btn-outline" id="logoutBtn">Logout</button>
        </div>
        
        <div class="tabs" style="display:flex;gap:0.5rem;margin-bottom:1.5rem;border-bottom:2px solid var(--background);">
          <button class="tab-btn active" onclick="adminApp.showTab('products')" data-tab="products">Products</button>
          <button class="tab-btn" onclick="adminApp.showTab('orders')" data-tab="orders">Orders</button>
        </div>
        
        <div id="productsTab">
          <div class="card" style="margin-bottom:1.5rem;">
            <h3>Add New Product</h3>
            <form id="addProductForm" style="gap:1rem;margin-top:1rem;">
              <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="newProductName" required placeholder="Enter product name">
              </div>
              <div class="form-group">
                <label>Price</label>
                <input type="number" id="newProductPrice" step="0.01" required placeholder="0.00">
              </div>
              <div class="form-group">
                <label>Category</label>
                <select id="newProductCategory">
                  <option value="clothes">Clothes</option>
                  <option value="books">Books</option>
                </select>
              </div>
              <div class="form-group">
                <label>Subcategory</label>
                <select id="newProductSubcategory">
                  <option value="men">Men</option>
                  <option value="women">Women</option>
                  <option value="children">Children</option>
                  <option value="fiction">Fiction</option>
                  <option value="textbooks">Textbooks</option>
                  <option value="childrens">Children's Books</option>
                </select>
              </div>
              <div class="form-group" style="grid-column:1/-1;">
                <label>Description</label>
                <input type="text" id="newProductDescription" placeholder="Product description">
              </div>
              <div class="form-group">
                <label>Icon (emoji)</label>
                <input type="text" id="newProductIcon" placeholder="👕" value="👕">
              </div>
              <div class="form-group">
                <label>In Stock</label>
                <select id="newProductInStock">
                  <option value="true">Yes</option>
                  <option value="false">No</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary" style="grid-column:1/-1;">Add Product</button>
            </form>
          </div>
          
          <div class="card">
            <h3>All Products</h3>
            <div style="overflow-x:auto;">
              <table class="admin-table" id="productsTable">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th>In Stock</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
        
        <div id="ordersTab" style="display:none;">
          <div class="card">
            <h3>All Orders</h3>
            <div style="overflow-x:auto;">
              <table class="admin-table" id="ordersTable">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Phone</th>
                    <th>Total</th>
                    <th>Payment</th>
                    <th>Status</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
   
  <footer class="footer" id="footer"></footer>
  
  <script>
    // Get Supabase config
    const SUPABASE_URL = window.__SUPABASE_URL__ || '';
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || '';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const loginForm = document.getElementById('loginForm');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginError = document.getElementById('loginError');
    const loginContainer = document.getElementById('loginContainer');
    const adminPanel = document.getElementById('adminPanel');
    const logoutBtn = document.getElementById('logoutBtn');
    
    let authToken = null;
    
    // Check for existing session on page load
    async function checkSession() {
      try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        if (session) {
          handleLoginSuccess(session.access_token);
        }
      } catch (err) {
        console.error('Session check error:', err);
      }
    }
    
    // Handle login form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.style.display = 'none';
      
      const email = loginEmail.value.trim();
      const password = loginPassword.value;
      
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) {
          loginError.textContent = 'Invalid credentials';
          loginError.style.display = 'block';
          return;
        }
        
        if (data.session) {
          handleLoginSuccess(data.session.access_token);
        }
      } catch (err) {
        loginError.textContent = 'Invalid credentials';
        loginError.style.display = 'block';
        console.error('Login error:', err);
      }
    });
    
    // Handle successful login
    function handleLoginSuccess(token) {
      authToken = token;
      loginContainer.style.display = 'none';
      adminPanel.style.display = 'block';
      loginError.style.display = 'none';
      loginForm.reset();
      
      // Initialize admin panel with authenticated requests
      initAdminPanel();
    }
    
    // Handle logout
    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      authToken = null;
      loginContainer.style.display = 'block';
      adminPanel.style.display = 'none';
      loginError.style.display = 'none';
    });
    
    // Make authenticated API request
    async function adminFetch(url, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`,
        ...(options.headers || {})
      };
      
      const response = await fetch(url, { ...options, headers });
      
      if (response.status === 401) {
        // Unauthorized - force logout
        await supabaseClient.auth.signOut();
        authToken = null;
        loginContainer.style.display = 'block';
        adminPanel.style.display = 'none';
        return null;
      }
      
      return response.json();
    }
    
    // Initialize admin panel (load products, orders, etc.)
    async function initAdminPanel() {
      // Load products
      await loadProducts();
      // Load orders
      await loadOrders();
      // Setup event handlers
      setupAdminHandlers();
    }
    
    // Load products
    async function loadProducts() {
      const result = await adminFetch('/api/admin?action=getProducts');
      if (result && result.data) {
        renderProductsTable(result.data);
      }
    }
    
    // Load orders
    async function loadOrders() {
      const result = await adminFetch('/api/admin?action=getOrders');
      if (result && result.data) {
        renderOrdersTable(result.data);
      }
    }
    
    // Render products table
    function renderProductsTable(products) {
      const tbody = document.querySelector('#productsTable tbody');
      tbody.innerHTML = '';
      products.forEach(p => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td>$${p.price.toFixed(2)}</td>
          <td>${p.category}</td>
          <td>${p.in_stock ? 'Yes' : 'No'}</td>
          <td><button onclick="confirmDeleteProduct(${p.id})" class="btn btn-outline">Delete</button></td>
        `;
        tbody.appendChild(row);
      });
    }
    
    // Render orders table
    function renderOrdersTable(orders) {
      const tbody = document.querySelector('#ordersTable tbody');
      tbody.innerHTML = '';
      orders.forEach(o => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${o.id}</td>
          <td>${o.customer_name || 'N/A'}</td>
          <td>${o.phone || 'N/A'}</td>
          <td>KSh ${o.total ? o.total.toLocaleString() : '0'}</td>
          <td>${o.payment_method || 'N/A'}</td>
          <td><select onchange="updateOrderStatus(${o.id}, this.value)" class="btn btn-outline">
            <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
            <option value="confirmed" ${o.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
            <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Delivered</option>
          </select></td>
          <td>${new Date(o.created_at).toLocaleDateString()}</td>
        `;
        tbody.appendChild(row);
      });
    }
    
    // Setup admin event handlers
    function setupAdminHandlers() {
      // Add product form
      document.getElementById('addProductForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const product = {
          name: document.getElementById('newProductName').value.trim(),
          price: parseFloat(document.getElementById('newProductPrice').value),
          category: document.getElementById('newProductCategory').value,
          subcategory: document.getElementById('newProductSubcategory').value,
          description: document.getElementById('newProductDescription').value.trim(),
          icon: document.getElementById('newProductIcon').value.trim(),
          in_stock: document.getElementById('newProductInStock').value === 'true'
        };
        
        const result = await adminFetch('/api/admin?action=addProduct', {
          method: 'POST',
          body: JSON.stringify(product)
        });
        
        if (result && result.success) {
          document.getElementById('addProductForm').reset();
          await loadProducts();
        }
      });
    }
    
    // Expose functions globally for inline handlers
    window.confirmDeleteProduct = async function(id) {
      if (confirm('Delete this product?')) {
        const result = await adminFetch('/api/admin?action=deleteProduct', {
          method: 'POST',
          body: JSON.stringify({ id })
        });
        if (result && result.success) {
          await loadProducts();
        }
      }
    };
    
    window.updateOrderStatus = async function(id, status) {
      const result = await adminFetch('/api/admin?action=updateOrderStatus', {
        method: 'POST',
        body: JSON.stringify({ id, status })
      });
    };
    
    // Check for existing session
    checkSession();
  </script>
</body>
</html>
