<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Company</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="header" id="header"></header>
  
  <section class="section">
    <div class="container">
      <div id="loginScreen" class="card" style="max-width:400px;margin:2rem auto;text-align:center;">
        <h2>Admin Login</h2>
        <p style="color:var(--text-light);margin-bottom:1rem;">Enter password to access admin panel</p>
        <div class="form-group">
          <input type="password" id="adminPassword" placeholder="Enter password">
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="login()">Login</button>
        <p id="loginError" style="color:var(--secondary);margin-top:0.5rem;display:none;">Incorrect password</p>
      </div>
      
      <div id="adminPanel" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
          <h1>Admin Dashboard</h1>
          <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
        
        <div class="tabs" style="display:flex;gap:0.5rem;margin-bottom:1.5rem;border-bottom:2px solid var(--background);">
          <button class="tab-btn active" onclick="showTab('products')" data-tab="products">Products</button>
          <button class="tab-btn" onclick="showTab('orders')" data-tab="orders">Orders</button>
        </div>
        
        <div id="productsTab">
          <div class="card" style="margin-bottom:1.5rem;">
            <h3>Add New Product</h3>
            <form id="addProductForm" style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-top:1rem;">
              <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="newProductName" required placeholder="Enter product name">
              </div>
              <div class="form-group">
                <label>Price</label>
                <input type="number" id="newProductPrice" step="0.01" required placeholder="0.00">
              </div>
              <div class="form-group">
                <label>Category</label>
                <select id="newProductCategory">
                  <option value="clothes">Clothes</option>
                  <option value="books">Books</option>
                </select>
              </div>
              <div class="form-group">
                <label>Subcategory</label>
                <select id="newProductSubcategory">
                  <option value="men">Men</option>
                  <option value="women">Women</option>
                  <option value="children">Children</option>
                  <option value="fiction">Fiction</option>
                  <option value="textbooks">Textbooks</option>
                  <option value="childrens">Children's Books</option>
                </select>
              </div>
              <div class="form-group" style="grid-column:1/-1;">
                <label>Description</label>
                <input type="text" id="newProductDescription" placeholder="Product description">
              </div>
              <div class="form-group">
                <label>Icon (emoji)</label>
                <input type="text" id="newProductIcon" placeholder="👕" value="👕">
              </div>
              <div class="form-group">
                <label>In Stock</label>
                <select id="newProductInStock">
                  <option value="true">Yes</option>
                  <option value="false">No</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary" style="grid-column:1/-1;">Add Product</button>
            </form>
          </div>
          
          <div class="card">
            <h3>All Products</h3>
            <div style="overflow-x:auto;">
              <table class="admin-table" id="productsTable">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th>In Stock</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
        
        <div id="ordersTab" style="display:none;">
          <div class="card">
            <h3>All Orders</h3>
            <div style="overflow-x:auto;">
              <table class="admin-table" id="ordersTable">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Phone</th>
                    <th>Total</th>
                    <th>Payment</th>
                    <th>Status</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  
  <footer class="footer" id="footer"></footer>
  
  <script src="../assets/js/main.js"></script>
  <script>
    const ADMIN_PASSWORD = 'admin123';
    let products = [];
    let orders = [];
    let editingProductId = null;
    
    const SUPABASE_URL = 'https://lldckqllbljogqbidbpp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsZGNrcWxsYmxqb2dxYmlkYnBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY2MTM1NTYsImV4cCI6MjA2MjE4OTU1Nn0.sb_publishable_zcqkR4_8oHbjjZbhMDpl3A_uMMg6UYo';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    function login() {
      const password = document.getElementById('adminPassword').value;
      if (password === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadAdminData();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
    
    function logout() {
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('adminPassword').value = '';
      document.getElementById('loginError').style.display = 'none';
    }
    
    function showTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById('productsTab').style.display = tab === 'products' ? 'block' : 'none';
      document.getElementById('ordersTab').style.display = tab === 'orders' ? 'block' : 'none';
    }
    
    async function loadAdminData() {
      await Promise.all([loadProducts(), loadOrders()]);
    }
    
    async function loadProducts() {
      const { data, error } = await supabaseClient.from('products').select('*').order('id');
      if (error) {
        console.error('Error loading products:', error);
        return;
      }
      products = data || [];
      renderProductsTable();
    }
    
    function renderProductsTable() {
      const tbody = document.querySelector('#productsTable tbody');
      tbody.innerHTML = products.map(p => `
        <tr>
          <td>${p.id}</td>
          <td>${p.icon} ${p.name}</td>
          <td>$${parseFloat(p.price).toFixed(2)}</td>
          <td>${p.category} - ${p.subcategory}</td>
          <td>${p.in_stock ? '✓' : '✗'}</td>
          <td>
            <button class="btn btn-outline" style="padding:0.25rem 0.5rem;font-size:0.75rem;margin-right:0.25rem;" onclick="editProduct(${p.id})">Edit</button>
            <button class="btn btn-secondary" style="padding:0.25rem 0.5rem;font-size:0.75rem;" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    }
    
    async function editProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;
      editingProductId = id;
      document.getElementById('newProductName').value = product.name;
      document.getElementById('newProductPrice').value = product.price;
      document.getElementById('newProductCategory').value = product.category;
      document.getElementById('newProductSubcategory').value = product.subcategory || 'men';
      document.getElementById('newProductDescription').value = product.description || '';
      document.getElementById('newProductIcon').value = product.icon || '👕';
      document.getElementById('newProductInStock').value = product.in_stock ? 'true' : 'false';
    }
    
    async function deleteProduct(id) {
      if (!confirm('Are you sure you want to delete this product?')) return;
      const { error } = await supabaseClient.from('products').delete().eq('id', id);
      if (error) {
        console.error('Error deleting product:', error);
        alert('Error deleting product');
        return;
      }
      loadProducts();
    }
    
    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('newProductName').value;
      const price = parseFloat(document.getElementById('newProductPrice').value);
      const category = document.getElementById('newProductCategory').value;
      const subcategory = document.getElementById('newProductSubcategory').value;
      const description = document.getElementById('newProductDescription').value;
      const icon = document.getElementById('newProductIcon').value;
      const in_stock = document.getElementById('newProductInStock').value === 'true';
      
      if (editingProductId) {
        const { error } = await supabaseClient.from('products').update({
          name, price, category, subcategory, description, icon, in_stock
        }).eq('id', editingProductId);
        
        if (error) {
          console.error('Error updating product:', error);
          alert('Error updating product');
          return;
        }
        editingProductId = null;
      } else {
        const { error } = await supabaseClient.from('products').insert([{
          name, price, category, subcategory, description, icon, in_stock
        }]);
        
        if (error) {
          console.error('Error adding product:', error);
          alert('Error adding product');
          return;
        }
      }
      
      e.target.reset();
      loadProducts();
    });
    
    async function loadOrders() {
      const { data, error } = await supabaseClient.from('orders').select('*').order('id', { ascending: false });
      if (error) {
        console.error('Error loading orders:', error);
        return;
      }
      orders = data || [];
      renderOrdersTable();
    }
    
    function renderOrdersTable() {
      const tbody = document.querySelector('#ordersTable tbody');
      tbody.innerHTML = orders.map(o => `
        <tr>
          <td>#${o.id}</td>
          <td>${o.customer_name}</td>
          <td>${o.customer_phone}</td>
          <td>$${parseFloat(o.total).toFixed(2)}</td>
          <td>${o.payment_method === 'mpesa' ? '📱 M-Pesa' : '💵 Cash'}</td>
          <td>
            <select onchange="updateOrderStatus(${o.id}, this.value)" style="padding:0.25rem;border-radius:var(--radius);">
              <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="confirmed" ${o.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
              <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Delivered</option>
            </select>
          </td>
          <td>${new Date(o.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
    }
    
    async function updateOrderStatus(id, status) {
      const { error } = await supabaseClient.from('orders').update({ status }).eq('id', id);
      if (error) {
        console.error('Error updating order:', error);
        alert('Error updating order status');
        return;
      }
      const order = orders.find(o => o.id === id);
      if (order) order.status = status;
    }
  </script>
</body>
</html>
