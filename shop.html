<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Faith & Fashion Nairobi - Shop our premium modest clothing and SDA books.">
  <meta name="theme-color" content="#1e3a5f">
  <meta property="og:title" content="Faith & Fashion Nairobi - Shop">
  <meta property="og:description" content="Browse our collection of premium modest clothing and SDA books.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://company-cyber.vercel.app/shop.html">
  <title>Shop - Faith & Fashion Nairobi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Load Supabase config from API endpoint -->
  <script src="/api/config.js" defer></script>
  <!-- Load main application bundle -->
  <script type="module" src="/src/main.js" defer></script>
</head>
<body>
  <header class="header" id="header"></header>
   
  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Shop Our Collection</h1>
      <p>Browse our premium modest clothing and SDA books for the whole family.</p>
    </div>
  </section>
   
  <!-- Shop Controls -->
  <section class="shop-controls">
    <div class="container">
      <div class="shop-header">
        <div class="shop-search">
          <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
            autocomplete="off"
          >
          <button type="button" id="searchBtn" class="btn btn-outline">Search</button>
        </div>
        
        <div class="shop-filters">
          <select id="sortSelect">
            <option value="featured">Featured</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="name">Name: A-Z</option>
          </select>
        </div>
      </div>
    </div>
  </section>
   
  <!-- Product Filters -->
  <section class="product-filters">
    <div class="container">
      <div class="filters-wrapper">
        <div class="filter-group">
          <h4>Category</h4>
          <button class="filter-link active" data-category="all" data-subcategory="all">All</button>
          <button class="filter-link" data-category="clothes" data-subcategory="men">Men</button>
          <button class="filter-link" data-category="clothes" data-subcategory="women">Women</button>
          <button class="filter-link" data-category="clothes" data-subcategory="children">Kids</button>
          <button class="filter-link" data-category="books">Books</button>
        </div>
      </div>
    </div>
  </section>
   
  <!-- Products Grid -->
  <section class="products-section">
    <div class="container">
      <div class="products-header">
        <h2 id="sectionTitle">All Products</h2>
        <p id="resultCount" class="result-count">Showing all products</p>
      </div>
      
      <div class="products-grid" id="productsGrid">
        <!-- Products loaded via JS -->
      </div>
    </div>
  </section>
   
  <footer class="footer" id="footer"></footer>
</body>
</html>
