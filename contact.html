<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Faith & Fashion Nairobi - Get in touch for orders and inquiries">
  <meta name="theme-color" content="#1e3a5f">
  <meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; img-src 'self' data: https:;">
  <title>Contact - Faith & Fashion Nairobi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="assets/css/style.css">
  <script
  src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"
  integrity="sha256-REPLACE_with_ACTUAL_HASH"
  crossorigin="anonymous"
  defer>
</script>
  <script src="config.js" defer></script>
  <script src="assets/js/main.js" defer></script>
  <script>
     // Use credentials from config.js
     const SUPABASE_URL = window.__SUPABASE_URL__ || '';
     const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || '';
     const { createClient } = supabase;
     const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
     
     async function handleSubmit(e) {
       e.preventDefault();
       const name = document.getElementById('name').value.trim();
       const email = document.getElementById('email').value.trim();
       const message = document.getElementById('message').value.trim();
       
       const { data, error } = await supabaseClient
         .from('messages')
         .insert([{
           name: name,
           email: email,
           message: message
         }]);
       
       if (error) {
         console.error('Error sending message:', error);
         alert('Error sending message. Please try again.');
         return;
       }
       
       alert('Thank you for your message! We will get back to you soon.');
       e.target.reset();
     }
   </script>
</body>
</html>
