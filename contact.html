<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Faith & Fashion Nairobi - Get in touch for orders and inquiries">
  <meta name="theme-color" content="#1e3a5f">
  <meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: https:">
  <title>Contact - Faith & Fashion Nairobi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script
  src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"
  crossorigin="anonymous"
  defer>
</script>
  <!-- Load Supabase config from API endpoint -->
  <script src="/api/config.js" defer></script>
  <!-- Load main application bundle -->
  <script type="module" src="/src/main.js" defer></script>
</head>
<body>
  <header class="header" id="header"></header>
  
  <section class="section">
    <div class="container">
      <h1 class="section-title">Contact Us</h1>
      
      <div class="contact-grid">
        <div class="contact-card">
          <div class="contact-card-icon">📞</div>
          <h3>Call Us</h3>
          <p>+254 700 000000</p>
        </div>
        <div class="contact-card">
          <div class="contact-card-icon">💬</div>
          <h3>WhatsApp</h3>
          <p>Chat with us 24/7</p>
        </div>
        <div class="contact-card">
          <div class="contact-card-icon">✉️</div>
          <h3>Email</h3>
          <p>faithandfashionnairobi@gmail.com</p>
        </div>
        <div class="contact-card">
          <div class="contact-card-icon">🕒</div>
          <h3>Hours</h3>
          <p>Mon–Sat: 9AM–6PM<br>Sun: Closed</p>
        </div>
      </div>
      
      <div class="contact-form-section">
        <h2>Send us a message</h2>
        <form class="contact-form" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="message" rows="5" placeholder="How can we help you?" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
          <div id="form-error" class="error-message" style="color:red;display:none;margin-top:10px;"></div>
          <div id="form-success" class="success-message" style="color:green;display:none;margin-top:10px;"></div>
        </form>
      </div>
    </div>
  </section>
  
  <footer class="footer" id="footer"></footer>
  
  <script>
    // Use credentials from config.js
    const SUPABASE_URL = window.__SUPABASE_URL__ || '';
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || '';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    async function handleSubmit(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      
      const { data, error } = await supabaseClient
        .from('messages')
        .insert([{
          name: name,
          email: email,
          message: message
        }]);
      
      if (error) {
        console.error('Error sending message:', error);
        alert('Error sending message. Please try again.');
        return;
      }
      
      alert('Thank you for your message! We will get back to you soon.');
      e.target.reset();
    }
  </script>
</body>
</html>
